{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">Edit Income</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                {{ form.source.label_tag }}
                {{ form.source }}
            </div>

            <div class="mb-3">
                {{ form.amount.label_tag }}
                {{ form.amount }}
            </div>

            <div class="mb-3">
                {{ form.description.label_tag }}
                {{ form.description }}
            </div>

            <button type="submit"
                    class="btn btn-primary">

                Update Income

            </button>

        </form>

    </div>

</div>

{% endblock %}
