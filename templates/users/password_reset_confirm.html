{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4 text-center">
                    Set New Password
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >
                        Reset Password
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
