{% extends 'base.html' %}

{% block content %}

<style>

body{
    background: linear-gradient(to right, #020617, #071226);
    min-height: 100vh;
    color: white;
}

/* PROFILE SECTION */

.profile-wrapper{
    max-width: 900px;
    margin: 50px auto;
    padding: 20px;
}

.profile-card{
    background: #1e293b;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.05);
}

/* TOP SECTION */

.profile-top{
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.profile-image{

    width: 130px;
    height: 130px;
    border-radius: 50%;
    overflow: hidden;

    border: 4px solid #38bdf8;

    background: #0f172a;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 50px;
    font-weight: bold;
}

.profile-image img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.profile-info h1{
    font-size: 42px;
    margin-bottom: 10px;
    font-weight: 700;
}

.profile-info p{
    color: #94a3b8;
    font-size: 17px;
    margin: 0;
}

/* FORM */

.form-group{
    margin-bottom: 25px;
}

.form-group label{
    display: block;
    margin-bottom: 10px;
    font-size: 16px;
    font-weight: 600;
    color: #f8fafc;
}

.form-control{

    width: 100%;
    padding: 14px 16px;

    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.08);

    background: #0f172a;
    color: white;

    outline: none;

    transition: 0.3s ease;
}

.form-control:focus{
    border-color: #38bdf8;
    box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
}

textarea.form-control{
    min-height: 140px;
    resize: none;
}

/* FILE INPUT */

input[type="file"]{
    background: #0f172a;
    color: white;
    border-radius: 14px;
    padding: 12px;
}

/* BUTTON */

.update-btn{

    width: 100%;
    padding: 15px;

    border: none;
    border-radius: 14px;

    background: linear-gradient(to right, #06b6d4, #3b82f6);

    color: white;
    font-size: 17px;
    font-weight: 700;

    transition: 0.3s ease;
}

.update-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(59,130,246,0.35);
}

/* MOBILE */

@media(max-width:768px){

    .profile-top{
        flex-direction: column;
        text-align: center;
    }

    .profile-info h1{
        font-size: 32px;
    }

}

</style>

<div class="profile-wrapper">

    <div class="profile-card">

        <!-- TOP -->

        <div class="profile-top">

            <div class="profile-image">

                {% if profile.profile_image %}
                    <img src="{{ profile.profile_image.url }}">
                {% else %}
                    {{ request.user.username|first|upper }}
                {% endif %}

            </div>

            <div class="profile-info">
                <h1>{{ request.user.username }}</h1>
                <p>{{ request.user.email }}</p>
            </div>

        </div>

        <!-- FORM -->

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-group">
                <label>Bio</label>

                <textarea
                    name="bio"
                    class="form-control"
                    placeholder="Write something about yourself..."
                >{{ profile.bio }}</textarea>
            </div>

            <div class="form-group">

                <label>Profile Image</label>

                <input
                    type="file"
                    name="profile_image"
                    class="form-control"
                >

            </div>

            <button type="submit" class="update-btn">
                Update Profile
            </button>

        </form>

    </div>

</div>

{% endblock %}
